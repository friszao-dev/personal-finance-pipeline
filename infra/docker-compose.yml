name: postgres-finance
services:
  postgres-finance:
    image: postgres:17
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata_finance:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata_finance: